services:
  - type: web
    name: ferry-demand-api
    runtime: python
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_PATH
        value: data/ferry_tickets.csv
      - key: MODELS_DIR
        value: models
      - key: PYTHON_VERSION
        value: "3.11.0"
